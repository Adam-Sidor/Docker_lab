<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pogoda</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            background: #f0f2f5;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 350px;
        }

        select,
        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #0056b3;
        }

        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background: #e9ecef;
            display: none;
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>Sprawdź pogodę</h2>
        <label for="city">Wybierz miasto:</label>
        <select id="city">
            <option value="52.2297,21.0122">Warszawa, Polska</option>
            <option value="50.0647,19.9450">Kraków, Polska</option>
            <option value="51.1079,17.0385">Wrocław, Polska</option>
            <option value="51.2465,22.5684">Lublin, Polska</option>
            <option value="52.5200,13.4050">Berlin, Niemcy</option>
            <option value="48.8566,2.3522">Paryż, Francja</option>
        </select>
        <button onclick="getWeather()">Pobierz pogodę</button>

        <div id="result">
            <strong id="res-city"></strong><br>
            Temperatura: <span id="res-temp"></span>°C<br>
            Prędkość wiatru: <span id="res-wind"></span> km/h
        </div>
    </div>

    <script>
        // Pobieranie danych pogodowych z Open-Meteo
        async function getWeather() {
            const citySelect = document.getElementById('city');
            const coords = citySelect.value.split(',');
            const cityName = citySelect.options[citySelect.selectedIndex].text;

            const url = `https://api.open-meteo.com/v1/forecast?latitude=${coords[0]}&longitude=${coords[1]}&current_weather=true`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                const weather = data.current_weather;

                // Aktualizacja UI o otrzymane dane
                document.getElementById('res-city').innerText = cityName;
                document.getElementById('res-temp').innerText = weather.temperature;
                document.getElementById('res-wind').innerText = weather.windspeed;
                document.getElementById('result').style.display = 'block';
            } catch (error) {
                alert('Błąd podczas pobierania pogody.');
            }
        }
    </script>

</body>

</html>
